[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

# Compiler
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

# FS permissions
fs_permissions = [
  { access = "read-write", path = "./docs" },
  { access = "read", path = "./deployments" },
]

[profile.default.fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x1234"

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = true

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 1024 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
wrap_comments = true

[doc]
out = "docs/book"
repository = "https://github.com/your-org/defi-superapp"

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
