###############################################################################
# DeFi Super-App Subgraph — subgraph.yaml
# Network: arbitrum-sepolia (chain id 421614)
# Addresses sourced from deployments/421614.json.
###############################################################################

specVersion: 1.0.0
indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:

  # ---------------------------------------------------------------------------
  # PairFactory — creates Pair templates on PairCreated
  # ---------------------------------------------------------------------------
  - kind: ethereum
    name: PairFactory
    network: arbitrum-sepolia
    source:
      address: "0xf56921ef32f00C65836E99324e350F97C5c39229"
      abi: PairFactory
      startBlock: 269961000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
      abis:
        - name: PairFactory
          file: ./abis/PairFactory.json
        - name: Pair
          file: ./abis/Pair.json
      eventHandlers:
        - event: PairCreated(indexed address,indexed address,address,uint256,bool)
          handler: handlePairCreated
      file: ./src/mappings/factory.ts

  # ---------------------------------------------------------------------------
  # LendingPool — collateral / debt / liquidations
  # ---------------------------------------------------------------------------
  - kind: ethereum
    name: LendingPool
    network: arbitrum-sepolia
    source:
      address: "0x0013766F7fb601E43aF9b4b1F40C9bE667E53205"
      abi: LendingPool
      startBlock: 269961013
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LendingPosition
        - LiquidationEvent
      abis:
        - name: LendingPool
          file: ./abis/LendingPool.json
      eventHandlers:
        - event: CollateralDeposited(indexed address,uint256)
          handler: handleCollateralDeposited
        - event: CollateralWithdrawn(indexed address,uint256)
          handler: handleCollateralWithdrawn
        - event: Borrowed(indexed address,uint256,uint256)
          handler: handleBorrowed
        - event: Repaid(indexed address,uint256,uint256)
          handler: handleRepaid
        - event: Liquidated(indexed address,indexed address,uint256,uint256)
          handler: handleLiquidated
      file: ./src/mappings/lending.ts

  # ---------------------------------------------------------------------------
  # ProtocolGovernor — proposals + votes
  # ---------------------------------------------------------------------------
  - kind: ethereum
    name: ProtocolGovernor
    network: arbitrum-sepolia
    source:
      address: "0xdED11a6Fa7062B7b6422061B54998C4002c2d80b"
      abi: ProtocolGovernor
      startBlock: 269961033
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
      abis:
        - name: ProtocolGovernor
          file: ./abis/ProtocolGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/mappings/governor.ts

# ---------------------------------------------------------------------------
# Templates — one Pair data source spun up per PairCreated event
# ---------------------------------------------------------------------------
templates:
  - kind: ethereum
    name: Pair
    network: arbitrum-sepolia
    source:
      abi: Pair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
      abis:
        - name: Pair
          file: ./abis/Pair.json
      eventHandlers:
        - event: Mint(indexed address,uint256,uint256,uint256,uint256)
          handler: handleMint
        - event: Burn(indexed address,uint256,uint256,indexed address,uint256)
          handler: handleBurn
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Sync(uint112,uint112)
          handler: handleSync
      file: ./src/mappings/pair.ts
