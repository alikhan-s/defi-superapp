###############################################################################
# DeFi Super-App Subgraph — schema.graphql
# Five core entities covering AMM pools, swaps, lending, governance, and
# liquidations on Arbitrum Sepolia.
###############################################################################

type Pool @entity {
  id: ID!                          # Pair contract address (lowercased)
  token0: Bytes!
  token1: Bytes!
  reserve0: BigInt!
  reserve1: BigInt!
  totalSupply: BigInt!
  swapsCount: BigInt!
  createdAtBlock: BigInt!

  swaps: [Swap!]! @derivedFrom(field: "pool")
}

type Swap @entity(immutable: true) {
  id: ID!                          # tx.hash + "-" + logIndex
  pool: Pool!
  sender: Bytes!
  amount0In: BigInt!
  amount1In: BigInt!
  amount0Out: BigInt!
  amount1Out: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type LendingPosition @entity {
  id: ID!                          # user address (lowercased)
  collateral: BigInt!
  debt: BigInt!
  healthFactor: BigInt!            # 1e18-scaled; type(uint256).max when debt == 0
  lastUpdated: BigInt!
}

type Proposal @entity {
  id: ID!                          # proposalId as decimal string
  proposalId: BigInt!
  proposer: Bytes!
  description: String!
  state: String!                   # Pending / Active / Succeeded / Defeated / Queued / Executed / Canceled
  forVotes: BigInt!
  againstVotes: BigInt!
  abstainVotes: BigInt!
  createdAt: BigInt!
  executedAt: BigInt
}

type LiquidationEvent @entity(immutable: true) {
  id: ID!                          # tx.hash + "-" + logIndex
  user: Bytes!
  liquidator: Bytes!
  debtCovered: BigInt!
  collateralSeized: BigInt!
  timestamp: BigInt!
}
