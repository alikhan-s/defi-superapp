name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cache Foundry build
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            out/
            cache/
          key: foundry-${{ hashFiles('foundry.toml', 'remappings.txt', 'src/**/*.sol') }}
          restore-keys: foundry-

      - name: Build
        run: forge build --sizes

      - name: Format check
        run: forge fmt --check

      - name: Run tests
        env:
          ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
        run: forge test -vvv

      - name: Coverage summary
        env:
          ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
        run: forge coverage --no-match-coverage "(script|test|lib)" --report summary
